contents = [

		,	'Bezier'
		,	'Curve'
		,	'JavaScript'
		]
	]
]
contents.forEach(
	$ => {
		const li = ARTICLES.appendChild( document.createElement( 'li' ) )
		li.textContent = $[ 0 ]
		li.classList.add( 'article' )
		li.onclick = () => location.href = location.origin + location.pathname + '?_=' + $[ 1 ]
	}
)

window.onload = () => {
	console.log( JSON.stringify( location, null, '\t' ) )
	const _ = contents.find( $ => location.search === '?_=' + $[ 1 ] )
	CONTENT.setAttribute( 'src', _ ? 'Contents/' + _[ 1 ] + '.html' : 'Welcome.html' )
}
