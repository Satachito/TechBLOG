<!DOCTYPE html>
<html lang=en>
<title>SliP Tech BLOG</title>

<style>
* {
;	margin					: 0
;	font-family				: monospace
;	transition				: all 0.3s
}

html {
;	height					: 100%
}
body {
;	height					: 100%
;	margin					: 0
;	display					: grid
;	grid-template-rows		: auto 1fr auto
;	grid-template-columns	: auto 1fr auto
}
header, footer {
;	grid-column				: 1 / 4
;	padding					: 2px 5px
}

header	{	padding			: 8px }
footer	{	padding			: 8px }

header	{	border-bottom	: 1px solid black }
footer	{	border-top		: 1px solid black }
nav		{	border-right	: 1px solid black }
aside	{	border-left		: 1px solid black }

.article {
;	color					: blue
;	text-decoration			: underline
;	cursor					: pointer
}

</style>

<header>
	<h1>SliP TechBLOG</h1>
</header>

<nav style="padding: 8px">
	<ul id=ARTICLES style="list-style-type: square; padding-left: 12px"></ul>
</nav>

<iframe id=CONTENT src=Welcome.html style="border: none; width: 100%; height: 100%"></iframe>
<aside></aside>
<footer id=FOOTER>	(C)2022 SliP LLC, Tokyo.	</footer>

<script type=module>
const
contents = [
	[	'Discover the power of Tensor Cores'
	,	'TensorCores'
	,	20220616
	,	[	'Tensor'
		,	'Matrix'
		,	'CUDA'
		,	'C++'
		]
	]
,	[	'Fitting a cubic Bezier curve'
	,	'CurveFit'
	,	20210105
	,	[	'Graphics'
		,	'Bezier'
		,	'Curve'
		,	'JavaScript'
		]
	]
]
contents.forEach(
	$ => {
		const li = ARTICLES.appendChild( document.createElement( 'li' ) )
		li.textContent = $[ 0 ]
		li.classList.add( 'article' )
		const _ = location
		li.onclick = locaion.href = _.origin + _.pathname + '?_=' + $[ 1 ]
	}
)

window.onload = () => {
	console.log( JSON.stringify( location, null, '\t' ) )
	const _ = contents.find( $ => locaion.href.search === '?_=' + $[ 1 ] )
	_ && CONTENT.setAttribute( 'src', 'Contents/' + _[ 1 ] + '.html' )
}

</script>
